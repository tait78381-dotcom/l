<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stickman Battle — Ultra 20K</title>
    <style>
        /* ===== RESET & BASE ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-touch-callout: none; -webkit-user-select: none; }
        body { background: #05050f; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Segoe UI', system-ui, sans-serif; touch-action: none; overflow: hidden; margin: 0; padding: 0; }
        
        /* ===== GAME CONTAINER ===== */
        #gameContainer { position: relative; width: 100vw; height: 100vh; max-width: 100vw; max-height: 100vh; background: #0a0a18; overflow: hidden; touch-action: none; display: flex; justify-content: center; align-items: center; }
        canvas { display: block; width: 100%; height: 100%; background: radial-gradient(ellipse at center, #1a2a3a, #060e18); touch-action: none; image-rendering: auto; }
        
        /* ===== UI OVERLAY ===== */
        #ui-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        /* ===== CONTROLS - NÚT CAO BẰNG DÒNG ĐỎ ===== */
        #controls { position: absolute; bottom: 0; left: 0; width: 100%; display: flex; justify-content: space-between; padding: 0 12px 20px 12px; pointer-events: none; gap: 8px; z-index: 20; background: linear-gradient(to top, rgba(255,0,0,0.08) 0%, transparent 100%); border-top: 3px solid rgba(255,0,0,0.25); }
        .control-group { display: flex; gap: 12px; pointer-events: auto; align-items: center; }
        .ctrl-btn { 
            width: 72px; height: 72px; border-radius: 50%; 
            background: rgba(255,255,255,0.06); 
            border: 2.5px solid rgba(255,255,255,0.12); 
            color: white; font-size: 28px; 
            display: flex; align-items: center; justify-content: center; 
            backdrop-filter: blur(12px); 
            box-shadow: 0 4px 30px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.05); 
            touch-action: none; cursor: pointer; 
            transition: 0.08s; 
            -webkit-tap-highlight-color: transparent;
            text-shadow: 0 0 20px rgba(255,255,255,0.1);
            font-weight: 700;
            letter-spacing: 1px;
        }
        .ctrl-btn:active { transform: scale(0.82); background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.3); }
        .ctrl-btn.action { 
            width: 84px; height: 84px; 
            background: rgba(255,40,40,0.25); 
            border-color: rgba(255,40,40,0.5); 
            font-size: 24px; 
            font-weight: 900;
            box-shadow: 0 0 40px rgba(255,0,0,0.15), inset 0 0 30px rgba(255,0,0,0.05);
        }
        .ctrl-btn.action:active { background: rgba(255,40,40,0.4); border-color: #ff1744; }
        .ctrl-btn.jump { background: rgba(50,200,255,0.15); border-color: rgba(50,200,255,0.3); }
        .ctrl-btn.jump:active { background: rgba(50,200,255,0.3); }
        .ctrl-btn.weapon { background: rgba(255,200,50,0.12); border-color: rgba(255,200,50,0.25); font-size: 22px; }
        .ctrl-btn.weapon:active { background: rgba(255,200,50,0.25); }
        .ctrl-btn.skill { background: rgba(200,50,255,0.12); border-color: rgba(200,50,255,0.25); font-size: 22px; }
        .ctrl-btn.skill:active { background: rgba(200,50,255,0.25); }
        .ctrl-btn.dodge { background: rgba(0,230,118,0.10); border-color: rgba(0,230,118,0.2); font-size: 22px; }
        .ctrl-btn.dodge:active { background: rgba(0,230,118,0.2); }
        
        /* ===== HUD ===== */
        #weapon-indicator { position: absolute; top: 14px; right: 14px; color: #fff; background: rgba(0,0,0,0.75); padding: 8px 20px; border-radius: 30px; font-size: 15px; border: 1px solid rgba(255,215,0,0.25); pointer-events: none; backdrop-filter: blur(6px); z-index: 15; font-weight: 600; letter-spacing: 0.5px; }
        #health-bar-p1, #health-bar-p2 { position: absolute; top: 14px; height: 20px; border-radius: 14px; background: rgba(0,0,0,0.8); overflow: hidden; border: 1px solid rgba(255,255,255,0.06); pointer-events: none; z-index: 15; }
        #health-bar-p1 { left: 14px; width: 24%; }
        #health-bar-p2 { right: 14px; width: 24%; }
        .health-fill { height: 100%; width: 100%; transition: width 0.12s ease; }
        .health-fill.p1 { background: linear-gradient(90deg, #ff1744, #ff6e40); }
        .health-fill.p2 { background: linear-gradient(90deg, #2979ff, #40c4ff); }
        #energy-bar-p1, #energy-bar-p2 { position: absolute; top: 38px; height: 6px; border-radius: 4px; background: rgba(0,0,0,0.5); overflow: hidden; pointer-events: none; z-index: 15; }
        #energy-bar-p1 { left: 14px; width: 24%; }
        #energy-bar-p2 { right: 14px; width: 24%; }
        .energy-fill { height: 100%; width: 0%; transition: width 0.2s ease; background: linear-gradient(90deg, #ffd54f, #ff9100); }
        #status-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: clamp(36px, 8vw, 68px); font-weight: 900; text-shadow: 0 0 80px rgba(255,200,0,0.9); pointer-events: none; opacity: 0; transition: opacity 0.4s, transform 0.3s; text-align: center; background: rgba(0,0,0,0.75); padding: 20px 48px; border-radius: 32px; backdrop-filter: blur(16px); z-index: 25; white-space: nowrap; letter-spacing: 3px; }
        #status-text.show { opacity: 1; transform: translate(-50%, -50%) scale(1.08); }
        #mode-select { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; gap: 16px; background: rgba(0,0,0,0.88); padding: 40px 52px; border-radius: 44px; backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.04); pointer-events: auto; z-index: 30; min-width: 260px; align-items: center; box-shadow: 0 50px 120px rgba(0,0,0,0.9); }
        #mode-select h2 { color: #fff; font-size: clamp(26px, 5.5vw, 42px); margin-bottom: 10px; text-align: center; letter-spacing: 4px; text-shadow: 0 0 50px rgba(255,200,50,0.12); font-weight: 800; }
        #mode-select button { padding: 18px 44px; border: none; border-radius: 22px; font-size: clamp(18px, 3vw, 26px); font-weight: 700; color: white; cursor: pointer; transition: 0.15s; touch-action: manipulation; width: 100%; min-width: 220px; letter-spacing: 0.5px; }
        #mode-select button:active { transform: scale(0.92); }
        .btn-pvp { background: linear-gradient(135deg, #ff6b6b, #ee5a24); }
        .btn-pve { background: linear-gradient(135deg, #4ecdc4, #0abde3); }
        .btn-tournament { background: linear-gradient(135deg, #f093fb, #f5576c); }
        .btn-survival { background: linear-gradient(135deg, #ffd54f, #ff6d00); }
        #name-tag-p1, #name-tag-p2 { position: absolute; top: 40px; color: rgba(255,255,255,0.4); font-size: 14px; font-weight: 700; pointer-events: none; z-index: 15; text-shadow: 0 0 20px rgba(0,0,0,0.9); letter-spacing: 0.5px; }
        #name-tag-p1 { left: 18px; color: #4fc3f7; }
        #name-tag-p2 { right: 18px; text-align: right; color: #ff6b6b; }
        #combo-display { position: absolute; top: 55%; left: 50%; transform: translateX(-50%); color: #ffd54f; font-size: clamp(40px, 7vw, 80px); font-weight: 900; pointer-events: none; z-index: 12; opacity: 0; transition: opacity 0.3s, transform 0.3s; text-shadow: 0 0 60px rgba(255,200,0,0.6); }
        #combo-display.show { opacity: 1; transform: translateX(-50%) scale(1.18); }
        #score-board { position: absolute; top: 68px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.1); font-size: 16px; pointer-events: none; z-index: 12; font-weight: 600; letter-spacing: 4px; }
        #timer-display { position: absolute; top: 14px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.15); font-size: 14px; pointer-events: none; z-index: 12; font-weight: 600; letter-spacing: 2px; }
        #kill-feed { position: absolute; top: 80px; right: 18px; pointer-events: none; z-index: 12; text-align: right; max-width: 200px; }
        .kill-entry { color: rgba(255,255,255,0.5); font-size: 11px; padding: 3px 0; opacity: 0; animation: fadeKill 2.5s forwards; font-weight: 500; letter-spacing: 0.3px; }
        @keyframes fadeKill { 0% { opacity: 0; transform: translateX(12px); } 15% { opacity: 1; transform: translateX(0); } 75% { opacity: 1; } 100% { opacity: 0; } }
        
        /* ===== RESPONSIVE ===== */
        @media (orientation: landscape) { 
            .ctrl-btn { width: 82px; height: 82px; font-size: 32px; } 
            .ctrl-btn.action { width: 94px; height: 94px; font-size: 28px; } 
            #controls { padding: 0 24px 28px 24px; } 
            .control-group { gap: 16px; }
        }
        @media (max-width: 500px) { 
            .ctrl-btn { width: 54px; height: 54px; font-size: 20px; } 
            .ctrl-btn.action { width: 64px; height: 64px; font-size: 16px; } 
            #controls { gap: 4px; padding: 0 6px 12px 6px; } 
            .control-group { gap: 6px; }
            #health-bar-p1, #health-bar-p2 { height: 14px; }
            #energy-bar-p1, #energy-bar-p2 { height: 4px; top: 32px; }
            #name-tag-p1, #name-tag-p2 { font-size: 11px; top: 34px; }
            #weapon-indicator { font-size: 11px; padding: 4px 12px; top: 10px; right: 10px; }
        }
        @media (max-width: 400px) {
            .ctrl-btn { width: 44px; height: 44px; font-size: 16px; }
            .ctrl-btn.action { width: 52px; height: 52px; font-size: 13px; }
            .ctrl-btn { border-width: 1.5px; }
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.06); } 100% { transform: scale(1); } }
        .pulse { animation: pulse 0.25s ease; }
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>

    <div id="ui-overlay">
        <div id="name-tag-p1">⚔️ P1</div>
        <div id="name-tag-p2">⚔️ P2</div>
        <div id="health-bar-p1"><div class="health-fill p1" id="hp1"></div></div>
        <div id="health-bar-p2"><div class="health-fill p2" id="hp2"></div></div>
        <div id="energy-bar-p1"><div class="energy-fill" id="energy1"></div></div>
        <div id="energy-bar-p2"><div class="energy-fill" id="energy2"></div></div>
        <div id="weapon-indicator">⚔️ Kiếm</div>
        <div id="status-text">⚔️ CHIẾN!</div>
        <div id="combo-display">🔥 COMBO x0</div>
        <div id="score-board">🏆 0 — 0</div>
        <div id="timer-display">⏱ 60s</div>
        <div id="kill-feed"></div>

        <div id="mode-select">
            <h2>🏹 STICKMAN ULTRA</h2>
            <button class="btn-pvp" id="btnPvP">👥 2 Người Chơi</button>
            <button class="btn-pve" id="btnPvE">🤖 Đấu Với Máy</button>
            <button class="btn-tournament" id="btnTournament">🏆 Giải Đấu 5 Hiệp</button>
            <button class="btn-survival" id="btnSurvival">🧟 Sinh Tồn Vô Cực</button>
        </div>
    </div>

    <div id="controls">
        <div class="control-group">
            <button class="ctrl-btn" id="leftBtn">◀</button>
            <button class="ctrl-btn" id="rightBtn">▶</button>
            <button class="ctrl-btn jump" id="jumpBtn">▲</button>
            <button class="ctrl-btn dodge" id="dodgeBtn">💨</button>
        </div>
        <div class="control-group">
            <button class="ctrl-btn skill" id="skillBtn">⚡</button>
            <button class="ctrl-btn weapon" id="weaponBtn">🔱</button>
            <button class="ctrl-btn action" id="attackBtn">⚔️</button>
        </div>
    </div>
</div>

<script>
// =================================================================
// 1. CANVAS & RESIZE
// =================================================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
    const container = document.getElementById('gameContainer');
    canvas.width = container.clientWidth;
    canvas.height = container.clientHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const W = () => canvas.width;
const H = () => canvas.height;

// =================================================================
// 2. UI REFERENCES
// =================================================================
const hp1 = document.getElementById('hp1');
const hp2 = document.getElementById('hp2');
const energy1 = document.getElementById('energy1');
const energy2 = document.getElementById('energy2');
const statusText = document.getElementById('status-text');
const weaponIndicator = document.getElementById('weapon-indicator');
const modeSelect = document.getElementById('mode-select');
const comboDisplay = document.getElementById('combo-display');
const scoreBoard = document.getElementById('score-board');
const timerDisplay = document.getElementById('timer-display');
const killFeed = document.getElementById('kill-feed');

// =================================================================
// 3. GAME STATE
// =================================================================
let gameMode = null;
let gameRunning = false;
let gameOver = false;
let winner = '';
let roundCount = 0;
let maxRounds = 5;
let p1Wins = 0;
let p2Wins = 0;
let tournamentActive = false;
let survivalActive = false;
let survivalWave = 1;
let survivalEnemies = [];
let survivalSpawnTimer = 0;
let frameCount = 0;
let particles = [];
let floatingTexts = [];
let screenShake = 0;
let gameTime = 0;
let matchTimer = 60;
let matchTimerMax = 60;
let killFeedEntries = [];

let globalSpeed = 1;
let isPaused = false;

// =================================================================
// 4. WEAPONS & SKILLS
// =================================================================
const WEAPONS = {
    sword: { name: 'Kiếm', icon: '⚔️', damage: 18, range: 55, cooldown: 380, projectile: false, color: '#ffd54f', critRate: 0.15, critMult: 1.8, weight: 1 },
    laser: { name: 'Laze', icon: '🔫', damage: 22, range: 250, cooldown: 550, projectile: true, projectileSpeed: 14, color: '#ff1744', critRate: 0.1, critMult: 2.0, weight: 1.2 },
    shield: { name: 'Khiên', icon: '🛡️', damage: 0, range: 0, cooldown: 700, projectile: false, color: '#4dd0ff', block: true, blockReduce: 0.85, weight: 0.8 },
    gun: { name: 'Súng', icon: '🔫', damage: 14, range: 360, cooldown: 280, projectile: true, projectileSpeed: 17, color: '#ffab00', critRate: 0.2, critMult: 1.6, weight: 0.9 },
    hammer: { name: 'Búa', icon: '🔨', damage: 30, range: 50, cooldown: 620, projectile: false, color: '#ff6e40', critRate: 0.25, critMult: 1.5, heavy: true, weight: 1.5 },
    spear: { name: 'Thương', icon: '🔱', damage: 20, range: 75, cooldown: 450, projectile: false, color: '#b39ddb', critRate: 0.12, critMult: 1.9, weight: 1.1 },
    bow: { name: 'Cung', icon: '🏹', damage: 16, range: 400, cooldown: 350, projectile: true, projectileSpeed: 18, color: '#66bb6a', critRate: 0.18, critMult: 1.7, weight: 0.9 },
    staff: { name: 'Pháp Trượng', icon: '🪄', damage: 25, range: 280, cooldown: 500, projectile: true, projectileSpeed: 10, color: '#ab47bc', critRate: 0.08, critMult: 2.2, weight: 1.3 }

const SKILLS = {
    heal: { name: 'Hồi Máu', icon: '💚', cost: 35, cooldown: 7000, duration: 0, effect: 'heal', amount: 35 },
    rage: { name: 'Cuồng Nộ', icon: '🔥', cost: 45, cooldown: 9000, duration: 4000, effect: 'rage', amount: 1.6 },

};

// =================================================================
// 5. STICKMAN CLASS — ULTRA với tỉ lệ vàng
// =================================================================
class Stickman {
    constructor(x, y, isPlayer1, name = 'Stick') {
        // --- Tỉ lệ vàng 1.618 ---
        this.goldenRatio = 1.618;
